<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《落下之後》｜直式墨痕眼淚修復版</title>
    <!-- ⚠️ 移除了原本錯誤的 <script src="...mjs"> -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        
        @keyframes fallSlow {
            0% { transform: translateY(-120px) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: translateY(820px) rotate(6deg); opacity: 0; filter: blur(8px); }
        }
        
        .tear {
            position: absolute;
            color: #1f1f1f;
            font-weight: 700;
            font-size: 32px;
            line-height: 1.05;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
            animation: fallSlow 7.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
            pointer-events: none;
            z-index: 30;
            text-align: center;
            white-space: pre;
            user-select: none;
        }
        
        .monitor-bezel {
            box-shadow: 0 0 0 20px #1e2937, 0 0 0 25px #0f172a, 25px 25px 50px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            background: #0f172a;
            width: 630px;   
            height: 1200px;  
            margin: 0 auto;
        }
        
        .monitor-bezel .inner {
            aspect-ratio: 9/16;
            width: 100%;
            height: 100%;
        }
        
        .tablet-bezel {
            box-shadow: 0 0 0 15px #1e2937, 0 0 0 20px #0f172a, 15px 15px 40px rgba(0,0,0,0.4);
            border-radius: 40px;
            overflow: hidden;
            background: #0f172a;
        }
        
        .gem-spin { animation: gemRotate 12s linear infinite; }
        @keyframes gemRotate {
            from { transform: rotateY(0deg) rotateX(15deg); }
            to { transform: rotateY(360deg) rotateX(15deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-zinc-950 text-white min-h-screen">

    <div class="max-w-7xl mx-auto px-8 py-6 border-b border-slate-800">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold tracking-wider">《落下之後》</h1>
                <p class="text-emerald-400 text-lg mt-1">直式墨痕眼淚 • 支援雙擊開啟版</p>
            </div>
            <div class="flex items-center gap-x-8 text-sm">
                <div class="flex items-center gap-x-2">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span id="flow-status" class="font-medium">系統運作中</span>
                </div>
                <button onclick="switchDevice(0)" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-3xl transition-all">📺 顯示器</button>
                <button onclick="switchDevice(1)" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-3xl transition-all">📱 平板</button>
                <button onclick="resetAll()" class="px-6 py-2 border border-slate-400 hover:border-white rounded-3xl text-sm flex items-center gap-x-2 transition-colors">🔄 重置體驗</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-8 py-8">
        <div class="flex flex-col gap-12">

            <!-- 顯示器 -->
            <div>
                <div class="flex items-center justify-between mb-4 px-4">
                    <div class="flex items-center gap-x-3">
                        <div class="text-2xl">📺</div>
                        <div>
                            <h2 class="text-2xl font-semibold">直式顯示器</h2>
                            <p id="mp-mode" class="text-emerald-400 text-sm">精準眼睛偵測運行中…</p>
                        </div>
                    </div>
                    <div id="mp-status" class="text-xs px-4 py-1 rounded-3xl flex items-center bg-slate-800 text-slate-300">⏳ AI 模型載入中</div>
                </div>

                <div class="monitor-bezel p-4 mx-auto">
                    <div class="inner relative bg-black rounded-2xl overflow-hidden shadow-inner">
                        <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                        <canvas id="face-overlay" class="absolute inset-0 pointer-events-none w-full h-full"></canvas>
                        
                        <div id="tears-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
                        
                        <div class="absolute bottom-6 left-6 bg-black/70 text-white text-xs px-4 py-2 rounded-3xl flex items-center gap-x-2">
                            <span class="text-emerald-400 animate-pulse">●</span>
                            <span id="status-text">等待互動...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 平板 -->
            <div>
                <div class="tablet-bezel p-6 mx-auto max-w-[520px] bg-gradient-to-b from-slate-900 to-zinc-900">
                    <div class="bg-white/5 rounded-3xl p-6 min-h-[520px] flex flex-col">
                        <!-- 選擇階段 -->
                        <div id="selection-stage">
                            <div class="text-center mb-6">
                                <p class="text-lg font-medium">請選擇<span class="text-blue-400"> 5 種</span>有感覺的詞彙</p>
                            </div>
                            <div id="words-grid" class="grid grid-cols-4 gap-3"></div>
                            <div class="mt-auto pt-8 border-t border-slate-700 flex items-center justify-between">
                                <div class="text-sm font-medium text-slate-400">
                                    已選擇 <span id="count-num" class="text-3xl text-white font-semibold">0</span>/5
                                </div>
                                <button onclick="submitSelection()" id="submit-btn" disabled class="px-10 py-4 bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 rounded-3xl text-lg font-semibold transition-all disabled:opacity-30">
                                    確認送出 ↓
                                </button>
                            </div>
                        </div>
                        
                        <!-- 結果階段 -->
                        <div id="result-stage" class="hidden flex-1 flex flex-col">
                            <div class="text-center">
                                <p class="text-sm uppercase tracking-widest text-emerald-400">您的情緒已轉化</p>
                                <h3 id="gem-title" class="text-3xl font-bold mt-3 mb-1"></h3>
                                <p id="gem-meaning" class="text-slate-400 text-sm"></p>
                            </div>
                            <div class="flex-1 flex items-center justify-center my-8 relative perspective-[1200px]">
                                <div class="w-60 h-60 rounded-3xl flex items-center justify-center bg-gradient-to-br from-slate-800 to-black shadow-2xl" style="transform-style: preserve-3d;">
                                    <img id="gem-image" src="" alt="寶石" class="gem-spin w-48 h-48 object-contain drop-shadow-2xl">
                                </div>
                            </div>
                            <div id="selected-words-display" class="flex flex-wrap gap-2 justify-center mb-8"></div>
                            <button onclick="resetSelection()" class="mx-auto px-8 py-3 border border-slate-400 hover:bg-white hover:text-slate-900 rounded-3xl text-sm font-medium transition-colors">
                                再體驗一次
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const wordsData = [
            { text: "孤單", gem: "pearl" }, { text: "想念", gem: "pearl" },
            { text: "失去", gem: "pearl" }, { text: "委屈", gem: "pearl" },
            { text: "責任", gem: "diamond" }, { text: "焦慮", gem: "diamond" },
            { text: "壓力", gem: "diamond" }, { text: "自責", gem: "diamond" },
            { text: "沒事", gem: "quartz" }, { text: "還好", gem: "quartz" },
            { text: "無力", gem: "quartz" }, { text: "有點累", gem: "quartz" },
            { text: "說不出口", gem: "opal" }, { text: "後悔", gem: "opal" },
            { text: "不知道怎麼辦", gem: "opal" }, { text: "捨不得", gem: "opal" },
            { text: "面子", gem: "lapis" }, { text: "期待", gem: "lapis" },
            { text: "別丟臉", gem: "lapis" }, { text: "不能示弱", gem: "lapis" }
        ];

        const gemData = {
            pearl: { name: "珍珠", meaning: "孤單、想念、失去、委屈", emoji: "🪩", image: "https://picsum.photos/id/1005/420/420" },
            diamond: { name: "鑽石", meaning: "責任、焦慮、壓力、自責", emoji: "💎", image: "https://picsum.photos/id/1015/420/420" },
            quartz: { name: "白水晶", meaning: "沒事、還好、無力、有點累", emoji: "🔮", image: "https://picsum.photos/id/160/420/420" },
            opal: { name: "蛋白石", meaning: "說不出口、後悔、不知道怎麼辦、捨不得", emoji: "🌈", image: "https://picsum.photos/id/201/420/420" },
            lapis: { name: "青金石", meaning: "面子、期待、別丟臉、不能示弱", emoji: "🪨", image: "https://picsum.photos/id/29/420/420" }
        };

        let selectedWords = [];
        let videoElement, overlayCanvas, overlayCtx;
        let faceLandmarker = null;
        let detectedEyes = []; 
        let tearInterval = null;
        let isFlowing = false;

        // ====================== 關鍵修正：動態載入 MediaPipe 解決 file:/// 的模組報錯 ======================
        async function initMediaPipe() {
            const statusEl = document.getElementById('mp-status');
            try {
                // 1. 使用動態 import() 取代 <script src="...">，避免 Unexpected token 'export'
                const module = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs");
                const FaceLandmarker = module.FaceLandmarker;
                const FilesetResolver = module.FilesetResolver;

                // 2. 獲取遠端 WASM 檔案
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
                
                // 3. 建立模型
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", 
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });

                statusEl.classList.remove('bg-slate-800', 'text-slate-300');
                statusEl.classList.add('bg-green-900', 'text-green-300');
                statusEl.innerHTML = '✅ 精準眼睛追蹤中';
                document.getElementById('mp-mode').innerHTML = '✅ <strong>AI 載入成功 (支援本機直接開啟)</strong>';
                return true;
            } catch (err) {
                console.error("MediaPipe 載入失敗：", err);
                statusEl.classList.add('bg-red-900', 'text-red-300');
                statusEl.innerHTML = '❌ 網路或鏡頭錯誤';
                return false;
            }
        }

        async function startWebcam() {
            videoElement = document.getElementById('webcam');
            overlayCanvas = document.getElementById('face-overlay');
            overlayCtx = overlayCanvas.getContext('2d');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } });
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = async () => {
                    const success = await initMediaPipe();
                    if (success) {
                        startRealEyeDetectionLoop();
                    }
                };
            } catch (error) {
                console.error("無法取得攝影機", error);
                document.getElementById('mp-status').innerHTML = '❌ 找不到攝影機權限';
            }
        }

        function startRealEyeDetectionLoop() {
            let lastTime = -1;
            const container = document.querySelector('.inner');

            async function loop() {
                const now = Date.now();
                if (videoElement.currentTime !== lastTime && faceLandmarker) {
                    lastTime = videoElement.currentTime;
                    const results = faceLandmarker.detectForVideo(videoElement, now);

                    const cw = container.clientWidth;
                    const ch = container.clientHeight;
                    const vw = videoElement.videoWidth || cw;
                    const vh = videoElement.videoHeight || ch;

                    if (overlayCanvas.width !== cw || overlayCanvas.height !== ch) {
                        overlayCanvas.width = cw;
                        overlayCanvas.height = ch;
                    }

                    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

                    // 有臉才更新座標並畫點，沒臉清空座標 (防止假點)
                    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                        const landmarks = results.faceLandmarks[0];
                        
                        const scale = Math.max(cw / vw, ch / vh);
                        const rw = vw * scale; 
                        const rh = vh * scale; 
                        const offsetX = (cw - rw) / 2; 
                        const offsetY = (ch - rh) / 2; 

                        function mapToCanvas(nx, ny) {
                            return { x: nx * rw + offsetX, y: ny * rh + offsetY };
                        }

                        // 左眼
                        const leftIndices = [159, 145, 144, 153, 154, 155];
                        let nxL = 0, countL = 0, maxNyL = 0;
                        leftIndices.forEach(i => {
                            if (landmarks[i]) {
                                nxL += landmarks[i].x;
                                if (landmarks[i].y > maxNyL) maxNyL = landmarks[i].y;
                                countL++;
                            }
                        });
                        const avgNxL = countL ? nxL / countL : 0.38;
                        const finalNyL = countL ? maxNyL : 0.29;
                        const ptL = mapToCanvas(avgNxL, finalNyL);
                        ptL.y += 10; 

                        // 右眼
                        const rightIndices = [362, 263, 387, 386, 385, 384, 398];
                        let nxR = 0, countR = 0, maxNyR = 0;
                        rightIndices.forEach(i => {
                            if (landmarks[i]) {
                                nxR += landmarks[i].x;
                                if (landmarks[i].y > maxNyR) maxNyR = landmarks[i].y;
                                countR++;
                            }
                        });
                        const avgNxR = countR ? nxR / countR : 0.58;
                        const finalNyR = countR ? maxNyR : 0.29;
                        const ptR = mapToCanvas(avgNxR, finalNyR);
                        ptR.y += 10; 

                        detectedEyes = [
                            { xPercent: (ptL.x / cw) * 100, yPercent: (ptL.y / ch) * 100 },
                            { xPercent: (ptR.x / cw) * 100, yPercent: (ptR.y / ch) * 100 }
                        ];

                        overlayCtx.shadowColor = '#22d3ee';
                        overlayCtx.shadowBlur = 20;
                        overlayCtx.fillStyle = '#67e8f9';
                        overlayCtx.beginPath(); overlayCtx.arc(ptL.x, ptL.y, 8, 0, Math.PI*2); overlayCtx.fill();
                        overlayCtx.beginPath(); overlayCtx.arc(ptR.x, ptR.y, 8, 0, Math.PI*2); overlayCtx.fill();
                    } else {
                        detectedEyes = [];
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        // ====================== UI 與互動邏輯 ======================
        function renderWords() {
            const grid = document.getElementById('words-grid');
            grid.innerHTML = '';
            wordsData.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-3 text-sm font-medium rounded-2xl transition-all border-2 border-transparent hover:border-slate-300 bg-white/10 hover:bg-white/20`;
                btn.textContent = item.text;
                btn.dataset.gem = item.gem;
                btn.addEventListener('click', () => toggleWord(btn));
                grid.appendChild(btn);
            });
        }

        function toggleWord(btn) {
            const isSelected = btn.classList.contains('!border-blue-400');
            if (isSelected) {
                btn.classList.remove('!border-blue-400', 'bg-blue-500/20', 'scale-95');
                selectedWords = selectedWords.filter(w => w.text !== btn.textContent);
            } else {
                if (selectedWords.length >= 5) return;
                btn.classList.add('!border-blue-400', 'bg-blue-500/20', 'scale-95');
                selectedWords.push({ text: btn.textContent, gem: btn.dataset.gem });
            }
            document.getElementById('count-num').textContent = selectedWords.length;
            document.getElementById('submit-btn').disabled = selectedWords.length !== 5;
        }

        function submitSelection() {
            if (selectedWords.length !== 5) return;
            document.getElementById('selection-stage').classList.add('hidden');
            document.getElementById('result-stage').classList.remove('hidden');

            isFlowing = true;
            document.getElementById('status-text').innerHTML = '👁️ 系統運行中 • 詞彙淚水轉換中';

            createTearsBurst();
            tearInterval = setInterval(() => { if (isFlowing) createTearsBurst(); }, 620);

            setTimeout(() => {
                const dominant = calculateDominantGem();
                showGemResult(dominant);
            }, 3200);
        }

        function createTearsBurst() {
            const container = document.getElementById('tears-container');
            if (!detectedEyes.length) return;

            selectedWords.forEach((wordObj, i) => {
                setTimeout(() => {
                    if (!isFlowing || !detectedEyes.length) return;
                    const tear = document.createElement('div');
                    tear.className = 'tear';
                    const chars = wordObj.text.split('');
                    tear.innerHTML = chars.join('<br>');
                    
                    const eye = detectedEyes[Math.floor(Math.random() * 2)];
                    tear.style.left = `${eye.xPercent + (Math.random() * 8 - 4)}%`;
                    tear.style.top = `${eye.yPercent + (Math.random() * 8 - 4)}%`;
                    
                    container.appendChild(tear);
                    tear.addEventListener('animationend', () => tear.remove());
                }, i * 95);
            });
        }

        function calculateDominantGem() {
            const countMap = { pearl: 0, diamond: 0, quartz: 0, opal: 0, lapis: 0 };
            selectedWords.forEach(w => countMap[w.gem]++);
            let max = 0, candidates = [];
            Object.keys(countMap).forEach(k => {
                if (countMap[k] > max) { max = countMap[k]; candidates = [k]; }
                else if (countMap[k] === max) candidates.push(k);
            });
            if (candidates.length > 1) {
                if (candidates.includes('pearl') && candidates.includes('diamond')) return Math.random() > 0.5 ? 'pearl' : 'diamond';
                return candidates[Math.floor(Math.random() * candidates.length)];
            }
            return candidates[0];
        }

        function showGemResult(key) {
            const gem = gemData[key];
            document.getElementById('gem-title').innerHTML = `${gem.emoji} ${gem.name}`;
            document.getElementById('gem-meaning').textContent = gem.meaning;
            document.getElementById('gem-image').src = gem.image;

            const container = document.getElementById('selected-words-display');
            container.innerHTML = '';
            selectedWords.forEach(w => {
                const tag = document.createElement('div');
                tag.className = 'px-5 py-2 bg-white/10 rounded-3xl text-sm font-medium';
                tag.textContent = w.text;
                container.appendChild(tag);
            });
        }

        function resetSelection() {
            stopFlow();
            selectedWords = [];
            document.getElementById('gem-title').innerHTML = '';
            document.getElementById('gem-meaning').textContent = '';
            document.getElementById('gem-image').src = '';
            document.getElementById('selected-words-display').innerHTML = '';
            document.getElementById('tears-container').innerHTML = '';
            document.getElementById('result-stage').classList.add('hidden');
            document.getElementById('selection-stage').classList.remove('hidden');
            renderWords();
            document.getElementById('status-text').innerHTML = '等待互動...';
        }

        function resetAll() { resetSelection(); }

        function stopFlow() {
            isFlowing = false;
            if (tearInterval) clearInterval(tearInterval);
        }

        function switchDevice(mode) {
            const m = document.querySelector('.monitor-bezel').parentElement;
            const t = document.querySelector('.tablet-bezel').parentElement;
            if (mode === 0) { m.style.transform = 'scale(1.05)'; t.style.transform = 'scale(0.95)'; }
            else { t.style.transform = 'scale(1.05)'; m.style.transform = 'scale(0.95)'; }
            setTimeout(() => { m.style.transform = 'scale(1)'; t.style.transform = 'scale(1)'; }, 600);
        }

        window.onload = () => {
            document.getElementById('status-text').innerHTML = '啟動鏡頭中...';
            startWebcam();
            renderWords();
        };
    </script>
</body>
</html>
